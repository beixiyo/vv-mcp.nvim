name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: read

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
          path: vv-mcp.nvim
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          repository: beixiyo/vv-utils.nvim
          persist-credentials: false
          path: vv-utils.nvim
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          workspaces: vv-mcp.nvim
      - uses: rhysd/action-setup-vim@febef33995d6649302e9d88dda81e071b68f16a7
        with:
          version: v0.12.0
          neovim: true
      - name: Match tag and Cargo version
        working-directory: vv-mcp.nvim
        run: |
          version=$(sed -n "s/^version = '\(.*\)'/\1/p" crates/vv-mcp/Cargo.toml)
          test "v$version" = "${GITHUB_REF_NAME}"
      - name: Verify Rust
        working-directory: vv-mcp.nvim
        run: |
          cargo fmt --all -- --check
          cargo test --locked --all-targets --all-features
          cargo clippy --locked --all-targets --all-features -- -D warnings
      - name: Verify Lua
        working-directory: vv-mcp.nvim
        run: |
          for test in tests/test_*.lua; do
            nvim --headless -u NONE -l "$test"
          done

  build:
    needs: verify
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-24.04
            target: x86_64-unknown-linux-musl
            use_cross: true
          - os: ubuntu-24.04
            target: aarch64-unknown-linux-musl
            use_cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            use_cross: false
          - os: macos-latest
            target: aarch64-apple-darwin
            use_cross: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            use_cross: false
            extension: .exe
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
        with:
          persist-credentials: false
      - uses: dtolnay/rust-toolchain@4be7066ada62dd38de10e7b70166bc74ed198c30
        with:
          toolchain: 1.97.0
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@7e35be21c2b94d972b1143087fabc27d7dc881ef
        with:
          key: ${{ matrix.target }}
      - name: Install cross
        if: matrix.use_cross
        run: cargo install cross --version 0.2.5 --locked
      - name: Build with cross
        if: matrix.use_cross
        run: cross build --locked --release --target ${{ matrix.target }}
      - name: Build with cargo
        if: ${{ ! matrix.use_cross }}
        run: cargo build --locked --release --target ${{ matrix.target }}
      - name: Collect binary
        shell: bash
        run: cp "target/${{ matrix.target }}/release/vv-mcp${{ matrix.extension }}" "vv-mcp-${{ matrix.target }}${{ matrix.extension }}"
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a
        with:
          name: vv-mcp-${{ matrix.target }}
          path: vv-mcp-${{ matrix.target }}${{ matrix.extension }}
          if-no-files-found: error

  release:
    needs: build
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c
        with:
          path: artifacts
          merge-multiple: true
      - name: Generate checksums
        working-directory: artifacts
        run: sha256sum vv-mcp-* > checksums.sha256
      - uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65
        with:
          files: artifacts/*
          generate_release_notes: true
